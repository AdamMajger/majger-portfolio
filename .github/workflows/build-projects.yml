name: Build projects.json

on:
  push:
    paths:
      - "site/work/**"
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build projects.json
        run: node scripts/build-projects.js

      - name: Commit if changed
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add site/projects.json
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: rebuild projects.json" && git push
